<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🍱 今晚吃什么？</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        * {
            font-family: 'Noto Sans SC', sans-serif;
        }
        
        @keyframes bounce-soft {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
        
        @keyframes pulse-glow {
            0%, 100% { box-shadow: 0 0 20px rgba(255, 182, 193, 0.5); }
            50% { box-shadow: 0 0 40px rgba(255, 182, 193, 0.8); }
        }
        
        @keyframes shake {
            0%, 100% { transform: rotate(0deg); }
            25% { transform: rotate(-5deg); }
            75% { transform: rotate(5deg); }
        }
        
        @keyframes fade-in-up {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        @keyframes spin-slow {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        
        .animate-bounce-soft {
            animation: bounce-soft 0.6s ease-in-out infinite;
        }
        
        .animate-pulse-glow {
            animation: pulse-glow 2s ease-in-out infinite;
        }
        
        .animate-shake {
            animation: shake 0.5s ease-in-out;
        }
        
        .animate-fade-in-up {
            animation: fade-in-up 0.5s ease-out forwards;
        }
        
        .food-tag {
            transition: all 0.3s ease;
        }
        
        .food-tag:hover {
            transform: scale(1.1);
        }
        
        .btn-press:active {
            transform: scale(0.95);
        }
        
        .result-reveal {
            animation: fade-in-up 0.8s ease-out forwards;
        }
    </style>
</head>
<body class="min-h-screen bg-gradient-to-br from-pink-50 via-yellow-50 to-blue-50">
    <div class="container mx-auto px-4 py-8 max-w-2xl">
        <div class="text-center mb-8 animate-fade-in-up">
            <div class="inline-flex items-center gap-2 mb-4">
                <span class="text-4xl">🍽️</span>
                <h1 class="text-3xl md:text-4xl font-bold text-pink-400">今晚吃什么？</h1>
                <span class="text-4xl">💕</span>
            </div>
            <p class="text-gray-500 text-lg">让我来帮你解决选择困难症吧~</p>
        </div>
        
        <div class="bg-white/80 backdrop-blur-sm rounded-3xl p-6 md:p-8 shadow-xl mb-6 animate-fade-in-up" style="animation-delay: 0.2s;">
            <div class="mb-6">
                <label class="block text-pink-400 font-medium mb-3 flex items-center gap-2">
                    <span>🥘</span>
                    <span>添加你想吃的食物</span>
                </label>
                <input 
                    type="text" 
                    id="foodInput" 
                    placeholder="输入想吃的食物，用逗号分隔哦~"
                    class="w-full px-5 py-4 rounded-2xl border-2 border-pink-100 bg-pink-50/50 focus:border-pink-300 focus:outline-none focus:ring-4 focus:ring-pink-100 text-gray-700 placeholder-gray-400 transition-all"
                >
            </div>
            
            <div class="mb-6">
                <div class="flex items-center justify-between mb-3">
                    <label class="text-pink-400 font-medium flex items-center gap-2">
                        <span>📋</span>
                        <span>候选菜单</span>
                    </label>
                    <button 
                        id="resetBtn"
                        class="px-4 py-2 bg-gray-100 hover:bg-gray-200 text-gray-600 rounded-xl text-sm font-medium transition-all btn-press"
                    >
                        🔄 重置
                    </button>
                </div>
                <div id="foodList" class="flex flex-wrap gap-2 min-h-[60px] p-3 bg-yellow-50/50 rounded-2xl">
                </div>
            </div>
            
            <div class="text-center">
                <button 
                    id="randomBtn"
                    class="w-full py-5 bg-gradient-to-r from-pink-400 via-rose-400 to-orange-400 hover:from-pink-500 hover:via-rose-500 hover:to-orange-500 text-white text-xl font-bold rounded-3xl shadow-lg hover:shadow-xl transition-all btn-press animate-pulse-glow"
                >
                    <span class="inline-flex items-center gap-2">
                        <span>✨</span>
                        <span>开始随机！</span>
                        <span>✨</span>
                    </span>
                </button>
            </div>
        </div>
        
        <div id="resultSection" class="hidden">
            <div class="bg-white/90 backdrop-blur-sm rounded-3xl p-8 shadow-2xl text-center border-4 border-pink-200">
                <div class="text-6xl mb-4" id="resultEmoji">🎉</div>
                <p class="text-gray-500 mb-2">今天吃</p>
                <div id="resultFood" class="text-4xl md:text-5xl font-bold bg-gradient-to-r from-pink-500 via-rose-500 to-orange-500 bg-clip-text text-transparent mb-4">
                </div>
                <p class="text-gray-400 text-sm">祝你用餐愉快！💕</p>
            </div>
        </div>
        
        <div class="text-center mt-8 text-gray-400 text-sm animate-fade-in-up" style="animation-delay: 0.4s;">
            <p>🍜 火锅 · 烧烤 · 米线 · 麻辣烫 · 寿司 · 炒饭 · 面条 · 汉堡 🍔</p>
        </div>
    </div>
    
    <script>
        const defaultFoods = ['火锅', '烧烤', '米线', '麻辣烫', '寿司', '炒饭', '面条', '汉堡'];
        let currentFoods = [...defaultFoods];
        
        const foodEmojis = {
            '火锅': '🍲',
            '烧烤': '🍢',
            '米线': '🍜',
            '麻辣烫': '🌶️',
            '寿司': '🍣',
            '炒饭': '🍚',
            '面条': '🍝',
            '汉堡': '🍔',
            '披萨': '🍕',
            '饺子': '🥟',
            '包子': '🥟',
            '沙拉': '🥗',
            '牛排': '🥩',
            '炸鸡': '🍗',
            '奶茶': '🧋',
            '咖啡': '☕',
            '蛋糕': '🍰'
        };
        
        const foodInput = document.getElementById('foodInput');
        const foodList = document.getElementById('foodList');
        const randomBtn = document.getElementById('randomBtn');
        const resetBtn = document.getElementById('resetBtn');
        const resultSection = document.getElementById('resultSection');
        const resultFood = document.getElementById('resultFood');
        const resultEmoji = document.getElementById('resultEmoji');
        
        function renderFoodList() {
            foodList.innerHTML = '';
            currentFoods.forEach((food, index) => {
                const tag = document.createElement('span');
                tag.className = 'food-tag inline-flex items-center gap-1 px-3 py-1.5 bg-gradient-to-r from-pink-100 to-yellow-100 text-pink-600 rounded-full text-sm font-medium cursor-pointer';
                tag.style.animationDelay = `${index * 0.05}s`;
                tag.innerHTML = `${getEmoji(food)} ${food}`;
                tag.title = '点击删除';
                tag.onclick = () => removeFood(index);
                foodList.appendChild(tag);
            });
        }
        
        function getEmoji(food) {
            return foodEmojis[food] || '🍽️';
        }
        
        function addFoods() {
            const input = foodInput.value.trim();
            if (!input) return;
            
            const newFoods = input.split(/[，,]/)
                .map(f => f.trim())
                .filter(f => f.length > 0 && !currentFoods.includes(f));
            
            if (newFoods.length > 0) {
                currentFoods = [...currentFoods, ...newFoods];
                renderFoodList();
                foodInput.value = '';
            }
        }
        
        function removeFood(index) {
            currentFoods.splice(index, 1);
            if (currentFoods.length === 0) {
                currentFoods = [...defaultFoods];
            }
            renderFoodList();
        }
        
        function resetFoods() {
            currentFoods = [...defaultFoods];
            foodInput.value = '';
            resultSection.classList.add('hidden');
            renderFoodList();
        }
        
        function getRandomFood() {
            if (currentFoods.length === 0) {
                currentFoods = [...defaultFoods];
            }
            return currentFoods[Math.floor(Math.random() * currentFoods.length)];
        }
        
        function animateAndShow() {
            resultSection.classList.add('hidden');
            randomBtn.classList.add('animate-bounce-soft');
            
            let count = 0;
            const maxCount = 15;
            const interval = setInterval(() => {
                const tempFood = getRandomFood();
                randomBtn.innerHTML = `<span class="inline-flex items-center gap-2"><span>🎲</span><span>${tempFood}</span><span>🎲</span></span>`;
                count++;
                
                if (count >= maxCount) {
                    clearInterval(interval);
                    const finalFood = getRandomFood();
                    showResult(finalFood);
                }
            }, 80);
        }
        
        function showResult(food) {
            randomBtn.classList.remove('animate-bounce-soft');
            randomBtn.innerHTML = `<span class="inline-flex items-center gap-2"><span>✨</span><span>开始随机！</span><span>✨</span></span>`;
            
            resultFood.textContent = food;
            resultEmoji.textContent = getEmoji(food);
            resultSection.classList.remove('hidden');
            resultSection.querySelector('div').classList.add('result-reveal');
            
            setTimeout(() => {
                resultSection.querySelector('div').classList.remove('result-reveal');
            }, 800);
        }
        
        foodInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                addFoods();
            }
        });
        
        foodInput.addEventListener('blur', addFoods);
        
        randomBtn.addEventListener('click', animateAndShow);
        
        resetBtn.addEventListener('click', resetFoods);
        
        renderFoodList();
    </script>
</body>
</html>
